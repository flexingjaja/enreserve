<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnRéserve.fr - Le bon prix à la pompe</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

        :root {
            /* Mode Clair (Défaut) */
            --bg-body: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --border-color: #e2e8f0;
            --accent: #059669;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --input-bg: #f8fafc;
            --btn-bg: #f1f5f9;
        }

        body.dark-mode {
            /* Mode Sombre */
            --bg-body: #09090b;
            --bg-sidebar: #121214;
            --bg-card: #1c1c1f;
            --bg-card-hover: #27272a;
            --border-color: #27272a;
            --accent: #10b981;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --input-bg: #09090b;
            --btn-bg: #27272a;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        body { 
            display: flex; height: 100vh; width: 100vw;
            background-color: var(--bg-body); color: var(--text-main); 
            overflow: hidden; transition: background-color 0.3s, color 0.3s;
        }
        a { text-decoration: none; }

        /* --- LAYOUT --- */
        .sidebar {
            width: 420px; height: 100vh; background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10;
            box-shadow: 2px 0 15px rgba(0,0,0,0.05);
        }

        .map-container { flex: 1; height: 100vh; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; background: var(--bg-body); cursor: crosshair; }

        /* --- HEADER & RECHERCHE --- */
        .header { padding: 20px 20px 15px 20px; border-bottom: 1px solid var(--border-color); }
        .brand-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .theme-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; }
        .theme-btn:hover { background: var(--btn-bg); transform: scale(1.1); }

        .search-wrapper { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-icon {
            background: var(--btn-bg); color: var(--text-main); border: 1px solid var(--border-color);
            border-radius: 10px; width: 42px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.1rem; transition: 0.2s;
        }
        .btn-icon:hover { filter: brightness(0.95); }
        body.dark-mode .btn-icon:hover { filter: brightness(1.2); }

        input[type="text"] {
            flex: 1; background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 0 15px; color: var(--text-main); font-size: 1rem; outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        .btn-submit {
            background: var(--accent); color: white; border: none; border-radius: 10px;
            padding: 0 15px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-submit:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* --- SLIDERS --- */
        .sliders-container { display: flex; gap: 15px; margin-bottom: 15px; }
        .slider-box { flex: 1; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; }
        .slider-label span:last-child { color: var(--text-main); }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* --- FILTRES (Grille 3x2 parfaite) --- */
        .filters { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-bottom: 5px; 
        }
        .filter-chip {
            background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 8px 0; border-radius: 10px; font-size: 0.8rem; font-weight: 700; cursor: pointer; 
            transition: all 0.2s; text-align: center;
        }
        .filter-chip.active { background: var(--text-main); color: var(--bg-body); border-color: var(--text-main); }

        /* --- LISTE --- */
        .results-scroll { flex: 1; overflow-y: auto; padding: 15px 20px; display: flex; flex-direction: column; gap: 12px; }
        .results-scroll::-webkit-scrollbar { width: 6px; }
        .results-scroll::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .status-msg { text-align: center; color: var(--text-muted); padding: 20px 0; font-size: 0.9rem; font-weight: 500; }

        /* --- CARTES STATIONS --- */
        .station-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 15px; transition: all 0.2s; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .station-card:hover { border-color: var(--accent); background: var(--bg-card-hover); transform: translateY(-2px); }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .station-info { flex: 1; min-width: 0; }
        .station-brand { font-size: 1.05rem; font-weight: 800; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-addr { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .price-info { text-align: right; flex-shrink: 0; }
        .price-val { font-size: 1.4rem; font-weight: 900; color: var(--text-main); letter-spacing: -1px; line-height: 1; }
        .price-type { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-top: 2px; display: block; }
        
        .total-badge {
            background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px;
            font-size: 0.85rem; font-weight: 800; margin-top: 6px; display: inline-block;
        }

        .card-actions, .popup-actions { display: flex; gap: 8px; margin-top: 15px; }
        .action-btn {
            flex: 1; display: block; text-align: center; background: var(--btn-bg); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 0; font-size: 0.75rem; font-weight: 700; transition: 0.2s;
        }
        .action-btn:hover { filter: brightness(0.9); }
        body.dark-mode .action-btn:hover { filter: brightness(1.2); }

        /* --- MARQUEURS ET POPUP CARTE --- */
        .map-price-marker {
            background: var(--bg-card); color: var(--text-main); padding: 4px 8px; border-radius: 8px;
            font-weight: 800; font-size: 13px; border: 2px solid var(--accent); text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); white-space: nowrap; line-height: 1.2;
        }
        body.dark-mode .map-price-marker { box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .map-price-marker::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: var(--accent) transparent transparent transparent;
        }
        .map-price-marker.cheapest { background: var(--accent); color: white; border-color: white; }
        .map-price-marker.cheapest::after { border-top-color: white; }
        
        .marker-total { font-size: 0.7rem; font-weight: 600; opacity: 0.8; }

        .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-main); border-radius: 12px; padding: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .leaflet-popup-tip { background: var(--bg-card); }
        .popup-title { font-weight: 900; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; font-size: 1rem; }
        .popup-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; font-size: 0.85rem; margin-bottom: 8px; }
        .popup-fuel { font-weight: 600; color: var(--text-muted); }
        .popup-price-group { text-align: right; }
        .popup-price { font-weight: 800; color: var(--text-main); display: block; }
        .popup-total { font-size: 0.7rem; color: var(--accent); font-weight: 700; }
        .leaflet-container a.leaflet-popup-close-button { color: var(--text-muted); }

        .footer-links { text-align: center; padding: 12px; border-top: 1px solid var(--border-color); font-size: 0.75rem; }
        .footer-links a { color: var(--text-muted); text-decoration: underline; }

        /* --- MOBILE OPTIMISÉ --- */
        @media (max-width: 768px) {
            body { flex-direction: column; height: 100dvh; } 
            
            .sidebar { 
                width: 100%; 
                height: 70dvh; 
                order: 2; 
                border-right: none;
                border-top: 1px solid var(--border-color);
                box-shadow: 0 -4px 15px rgba(0,0,0,0.05); 
            }
            
            .map-container { height: 30dvh; order: 1; }

            .header { padding: 12px 15px 10px 15px; }
            .brand-row { margin-bottom: 10px; }
            .logo { font-size: 1.4rem; }
            .search-wrapper { margin-bottom: 10px; }
            
            input[type="text"], .btn-icon, .btn-submit { height: 42px; }
            
            .sliders-container { margin-bottom: 10px; gap: 12px; }
            .slider-label { font-size: 0.75rem; margin-bottom: 2px; }
            
            .filters { gap: 6px; margin-bottom: 0px; }
            .filter-chip { padding: 6px 0; font-size: 0.75rem; border-radius: 8px; }

            .results-scroll { padding: 10px 15px; }
            .station-card { padding: 12px; border-radius: 12px; }
            
            .card-actions { margin-top: 10px; gap: 6px; }
            .action-btn { padding: 8px 0; font-size: 0.75rem; }
            .footer-links { padding: 8px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header">
            <div class="brand-row">
                <div class="logo">EnRéserve<span>.fr</span></div>
                <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" title="Changer le thème">🌙</button>
            </div>

            <div class="search-wrapper">
                <button class="btn-icon" onclick="locateMe()" title="Autour de moi">📍</button>
                <input type="text" id="cp" placeholder="Code postal (ex: 76000)" maxlength="5">
                <button class="btn-submit" onclick="searchByCP()">Scanner</button>
            </div>

            <div class="sliders-container">
                <div class="slider-box">
                    <div class="slider-label"><span>Rayon</span><span id="dist-val">10 km</span></div>
                    <input type="range" id="radius" min="1" max="50" value="10" oninput="updateDist(this.value)" onchange="triggerMapFetch()">
                </div>
                <div class="slider-box">
                    <div class="slider-label"><span>Mon plein</span><span id="liters-val">50 L</span></div>
                    <input type="range" id="liters" min="5" max="100" value="50" oninput="updateLiters(this.value)">
                </div>
            </div>
            
            <div class="filters">
                <button class="filter-chip active" data-key="gazole_prix">Gazole</button>
                <button class="filter-chip active" data-key="e10_prix">E10</button>
                <button class="filter-chip active" data-key="sp95_prix">SP95</button>
                <button class="filter-chip active" data-key="sp98_prix">SP98</button>
                <button class="filter-chip" data-key="e85_prix">E85</button>
                <button class="filter-chip" data-key="gplc_prix">GPLc</button>
            </div>
        </div>

        <div class="results-scroll" id="results">
            <div class="status-msg">Entrez un code postal, utilisez la géolocalisation ou déplacez la carte pour commencer.</div>
        </div>

        <div class="footer-links">
            <a href="mentions.html">Mentions légales</a>
        </div>
    </aside>

    <main class="map-container">
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([49.4432, 1.0999], 12);
        let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        const markersGroup = L.layerGroup().addTo(map);

        window.addEventListener('resize', () => map.invalidateSize());
        document.getElementById('cp').addEventListener('keypress', e => { if (e.key === 'Enter') searchByCP(); });

        let currentStationsData = []; 
        let blockMapEvent = false; 
        let mapMoveTimeout; 

        // GESTION CARTE INTERACTIVE
        map.on('moveend', () => {
            if (blockMapEvent) {
                blockMapEvent = false;
                return;
            }
            clearTimeout(mapMoveTimeout);
            mapMoveTimeout = setTimeout(() => {
                const center = map.getCenter();
                fetchStations(center.lat, center.lng);
            }, 500);
        });

        function triggerMapFetch() {
            const center = map.getCenter();
            fetchStations(center.lat, center.lng);
        }

        // GESTION UI
        function updateDist(v) { document.getElementById('dist-val').innerText = v + " km"; }
        function updateLiters(v) { 
            document.getElementById('liters-val').innerText = v + " L"; 
            if(currentStationsData.length > 0) renderUI(); 
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            tileLayer.setUrl(isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png');
            document.getElementById('theme-btn').innerText = isDark ? '☀️' : '🌙';
        }

        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.onclick = function() {
                this.classList.toggle('active');
                if(currentStationsData.length > 0) renderUI(); 
            };
        });

        const fuelMap = { 'gazole_prix': 'Gazole', 'e10_prix': 'E10', 'sp95_prix': 'SP95', 'sp98_prix': 'SP98', 'e85_prix': 'E85', 'gplc_prix': 'GPLc' };
        const formatT = (t) => t ? t.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase()) : '';

        function getCleanBrand(s) {
            let name = (s.nom || "").toUpperCase().trim();
            let addr = (s.adresse || "").toUpperCase().trim();
            const brands = ["TOTAL", "CARREFOUR", "LECLERC", "INTERMARCHE", "ESSO", "BP", "AUCHAN", "CASINO", "SYSTEME U", "AVIA", "SHELL", "ENI", "CORA", "SUPER U"];
            
            for (let b of brands) { if (name.includes(b) || addr.includes(b)) return b; }
            if (name === addr || name === "" || name.includes("RUE") || name.includes("AVENUE") || name.includes("ROUTE") || name.includes("Z.A")) return "Station"; 
            return formatT(s.nom);
        }

        // RECHERCHES
        async function searchByCP() {
            const cp = document.getElementById('cp').value.trim();
            const resDiv = document.getElementById('results');

            if (!/^\d{5}$/.test(cp)) {
                resDiv.innerHTML = '<div class="status-msg">Veuillez entrer un code postal valide.</div>';
                return;
            }

            resDiv.innerHTML = '<div class="status-msg">Recherche de la ville...</div>';
            
            try {
                const geo = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${cp}&type=municipality&limit=1`).then(r => r.json());
                if (!geo.features.length) throw new Error("Code postal introuvable.");
                const [lon, lat] = geo.features[0].geometry.coordinates;
                
                blockMapEvent = true; 
                map.setView([lat, lon], 12, { animate: false }); 
                fetchStations(lat, lon);
            } catch (e) {
                resDiv.innerHTML = `<div class="status-msg">Erreur: ${e.message}</div>`;
            }
        }

        function locateMe() {
            if (!navigator.geolocation) return alert("Géolocalisation non supportée.");
            document.getElementById('results').innerHTML = '<div class="status-msg">Recherche de votre position...</div>';
            
            navigator.geolocation.getCurrentPosition(
                pos => {
                    document.getElementById('cp').value = "";
                    blockMapEvent = true;
                    map.setView([pos.coords.latitude, pos.coords.longitude], 12, { animate: false });
                    fetchStations(pos.coords.latitude, pos.coords.longitude);
                },
                err => { document.getElementById('results').innerHTML = '<div class="status-msg">Géolocalisation refusée.</div>'; }
            );
        }

        // API CALL
        async function fetchStations(lat, lon) {
            const radius = document.getElementById('radius').value;
            const resDiv = document.getElementById('results');

            resDiv.innerHTML = '<div class="status-msg">Analyse des pompes dans cette zone...</div>';
            markersGroup.clearLayers();

            try {
                const data = await fetch(`https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom, geom'POINT(${lon} ${lat})', ${radius}km)&limit=80`).then(r => r.json());
                currentStationsData = data.results; 
                renderUI(); 
            } catch (e) { 
                resDiv.innerHTML = `<div class="status-msg">Erreur réseau : Impossible de récupérer les données.</div>`; 
            }
        }

        // AFFICHAGE
        function renderUI() {
            const resDiv = document.getElementById('results');
            const activeFuels = Array.from(document.querySelectorAll('.filter-chip.active')).map(b => b.dataset.key);
            const volume = parseFloat(document.getElementById('liters').value);

            markersGroup.clearLayers();

            if (activeFuels.length === 0) {
                resDiv.innerHTML = '<div class="status-msg">Sélectionnez au moins un type de carburant.</div>';
                return;
            }

            let stations = currentStationsData.map(s => {
                if (!s.geom) return null;
                
                let allPrices = [];
                Object.keys(fuelMap).forEach(k => { 
                    if(s[k]) allPrices.push({ label: fuelMap[k], price: parseFloat(s[k]) }); 
                });
                
                let bestP = Infinity, bestT = '';
                activeFuels.forEach(k => { 
                    if(s[k] && parseFloat(s[k]) < bestP) { bestP = parseFloat(s[k]); bestT = fuelMap[k]; }
                });
                
                if (bestP === Infinity) return null;

                return {
                    id: s.id, brand: getCleanBrand(s), addr: formatT(s.adresse), city: formatT(s.ville),
                    price: bestP, type: bestT, allPrices: allPrices, lat: s.geom.lat, lon: s.geom.lon
                };
            }).filter(x => x).sort((a,b) => a.price - b.price);

            if (stations.length === 0) {
                resDiv.innerHTML = '<div class="status-msg">Aucune station trouvée pour ces carburants dans la zone affichée.</div>';
                return;
            }

            resDiv.innerHTML = '';
            
            stations.slice(0, 20).forEach((s, index) => {
                const isCheapest = index === 0;
                const totalEuro = (s.price * volume).toFixed(2);
                const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}`;
                const wazeUrl = `https://waze.com/ul?ll=${s.lat},${s.lon}&navigate=yes`;
                
                // 1. La Carte Latérale
                const card = document.createElement('div');
                card.className = 'station-card';
                card.innerHTML = `
                    <div class="card-top" onclick="map.setView([${s.lat}, ${s.lon}], 15)">
                        <div class="station-info">
                            <div class="station-brand">${s.brand}</div>
                            <div class="station-addr">${s.addr}<br>${s.city}</div>
                        </div>
                        <div class="price-info">
                            <div class="price-val">${s.price.toFixed(3)}</div>
                            <span class="price-type">${s.type}</span>
                            <div class="total-badge">${totalEuro} €</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <a class="action-btn" href="${mapsUrl}" target="_blank">Google Maps</a>
                        <a class="action-btn" href="${wazeUrl}" target="_blank">Waze</a>
                    </div>
                `;
                resDiv.appendChild(card);

                // 2. Le Popup Leaflet
                let popupHTML = `<div class="popup-title">${s.brand}</div>`;
                s.allPrices.forEach(p => { 
                    const pTotal = (p.price * volume).toFixed(2);
                    popupHTML += `
                        <div class="popup-row">
                            <span class="popup-fuel">${p.label}</span>
                            <div class="popup-price-group">
                                <span class="popup-price">${p.price.toFixed(3)}€ /L</span>
                                <span class="popup-total">${pTotal}€ au total</span>
                            </div>
                        </div>`; 
                });
                
                popupHTML += `
                    <div class="popup-actions" style="margin-top:12px; border-top:1px solid var(--border-color); padding-top:10px;">
                        <a class="action-btn" href="${mapsUrl}" target="_blank">Maps</a>
                        <a class="action-btn" href="${wazeUrl}" target="_blank">Waze</a>
                    </div>`;

                // 3. Le Marqueur sur la carte
                const iconHTML = `
                    <div class="map-price-marker ${isCheapest ? 'cheapest' : ''}">
                        ${s.price.toFixed(3)}€
                        <div class="marker-total">${totalEuro}€</div>
                    </div>`;
                
                const customIcon = L.divIcon({ className: '', html: iconHTML, iconSize: [60, 40], iconAnchor: [30, 46] });
                L.marker([s.lat, s.lon], { icon: customIcon }).addTo(markersGroup).bindPopup(popupHTML);
            });
        }

        // Lancer une recherche initiale au chargement
        setTimeout(() => { triggerMapFetch(); }, 500);

    </script>
</body>
</html>
